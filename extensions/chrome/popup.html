<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FlowPilot</title>
    <style>
      body {
        width: 300px;
        margin: 0;
        padding: 14px;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #17202a;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 18px;
      }
      label {
        display: grid;
        gap: 6px;
        margin: 12px 0;
        font-weight: 650;
      }
      input {
        font: inherit;
        padding: 8px 10px;
        border: 1px solid #b7c0ca;
        border-radius: 6px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .row input { width: auto; }
      button {
        width: 100%;
        margin-top: 8px;
        padding: 9px 10px;
        border: 1px solid #087ea4;
        border-radius: 6px;
        color: #fff;
        background: #087ea4;
        font: inherit;
        cursor: pointer;
      }
      #status {
        min-height: 20px;
        margin-top: 10px;
        color: #1a7f37;
      }
    </style>
  </head>
  <body>
    <h1>FlowPilot</h1>
    <label class="row">
      <input id="enabled" type="checkbox">
      Enable widget injection
    </label>
    <label>
      Local backend URL
      <input id="api-base" type="url" placeholder="http://127.0.0.1:8000">
    </label>
    <button id="save" type="button">Save</button>
    <div id="status" role="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
